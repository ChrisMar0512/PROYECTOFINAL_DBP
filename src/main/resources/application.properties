# ============================================================
# ParkShare — Configuración de la Aplicación
# ============================================================

# --- Servidor ---
server.port=8080

# --- Base de Datos ---
spring.datasource.url=jdbc:postgresql://localhost:5432/parkshare
spring.datasource.username=parkshare_user
spring.datasource.password=parkshare_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT (SEGURIDAD: cambiar en producción por variable de entorno) ---
# El secreto debe tener al menos 64 caracteres para HS256
app.jwt.secret=cGFya3NoYXJlX3NlY3JldF9zdXBlcl9zZWd1cm9fcGFyYV9qd3RfaHMyNTZfbGltYV9wZXJ1XzIwMjQ=
# Tiempo de expiración en milisegundos (86400000 = 24 horas)
app.jwt.expiration=86400000

# --- Firebase Cloud Messaging ---
# El archivo firebase-service-account.json se obtiene desde Firebase Console
# y NO debe subirse al repositorio (ver .gitignore)
firebase.credentials.path=classpath:firebase-service-account.json

# --- Logging ---
logging.level.com.parkshare=INFO
logging.level.org.springframework.security=WARN

# --- Cloudinary (almacenamiento de imágenes de cocheras) ---
# Los valores se obtienen desde el Dashboard de Cloudinary: https://cloudinary.com/console
# Settings -> API Keys -> API Key, API Secret y Cloud Name
cloudinary.cloud-name=tu-cloud-name-aqui
cloudinary.api-key=123456789012345
cloudinary.api-secret=tu-api-secret-aqui

# --- Email (SMTP — Gmail App Password para desarrollo) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=parkshare.noreply@gmail.com
spring.mail.password=app-password-aqui
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
