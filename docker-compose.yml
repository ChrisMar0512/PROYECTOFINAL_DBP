version: '3.8'

services:
  parkshare_db:
    image: postgis/postgis:16-3.4
    container_name: parkshare_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkshare}
      POSTGRES_USER: ${POSTGRES_USER:-parkshare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkshare_pass}
    ports:
      - "5432:5432"
    volumes:
      - parkshare_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkshare_user} -d ${POSTGRES_DB:-parkshare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  parkshare_app:
    build: .
    container_name: parkshare_app
    ports:
      - "8080:8080"
    depends_on:
      parkshare_db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://parkshare_db:5432/parkshare
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-parkshare_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-parkshare_pass}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-cambia_este_secreto_por_uno_de_al_menos_64_caracteres_aleatorios_seguro}
      APP_JWT_EXPIRATION: ${APP_JWT_EXPIRATION:-86400000}
    restart: unless-stopped

volumes:
  parkshare_data:
    driver: local
